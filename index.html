<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Metrics Dashboard Prototype</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Load Lucide Icons for the prototype -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="dashboard">
    <header class="dashboard-header">
      <div>
        <h1 class="welcome-text">Hi, John 👋</h1>
        <p class="subtitle">Here's what's happening with your workflows today.</p>
      </div>
      <div class="header-actions">
        <div class="date-badge">
          <i data-lucide="clock" width="16" height="16"></i>
          <span id="current-date"></span>
        </div>
        <button class="primary-btn">New Task</button>
      </div>
    </header>

    <div class="stats-grid">
      <div class="stat-card glass border-primary">
        <div class="icon-wrapper color-primary"><i data-lucide="clipboard-list"></i></div>
        <div class="stat-content">
          <label>Total Tasks</label>
          <h3>15</h3>
          <span class="trend">+12%</span>
        </div>
      </div>
      <div class="stat-card glass border-success">
        <div class="icon-wrapper color-success"><i data-lucide="check-circle-2"></i></div>
        <div class="stat-content">
          <label>Completed</label>
          <h3>8</h3>
          <span class="trend">+5%</span>
        </div>
      </div>
      <div class="stat-card glass border-secondary">
        <div class="icon-wrapper color-secondary"><i data-lucide="zap"></i></div>
        <div class="stat-content">
          <label>Efficiency</label>
          <h3>84%</h3>
          <span class="trend">Stable</span>
        </div>
      </div>
      <div class="stat-card glass border-warning">
        <div class="icon-wrapper color-warning"><i data-lucide="alert-triangle"></i></div>
        <div class="stat-content">
          <label>Delay Time</label>
          <h3>2h</h3>
          <span class="trend">-2h</span>
        </div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="main-panel glass">
        <div class="section-header">
          <h3>Recent Activity</h3>
          <button class="text-btn">View All <i data-lucide="arrow-up-right" width="16"></i></button>
        </div>
        <div class="activity-list" id="activity-list">
          <!-- Populated by Javascript -->
        </div>
      </div>

      <div class="side-panel glass">
        <div class="section-header">
          <h3>Workflow Efficiency</h3>
          <i data-lucide="trending-up" class="header-icon" width="18"></i>
        </div>
        <div class="chart-container">
          <div class="bar-chart" id="bar-chart">
            <!-- Populated by Javascript -->
          </div>
        </div>
        <div class="panel-footer">
          <div class="performance-summary">
            <p>Your efficiency is up <strong>8%</strong> this week. Great job!</p>
          </div>
          <button class="outline-btn full-width">
            Full Analytics <i data-lucide="external-link" width="14"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
